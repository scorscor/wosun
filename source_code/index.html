<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>莴笋</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    .main-view {
      padding: 20px;
      text-align: center;
      width: 100vw;
      height: 100vh;
      background: white;
    }
    .logo {
      width: 100px;
      height: 100px;
      margin: 20px auto;
    }
    h1 {
      color: #58A352;
      margin: 10px 0;
    }
    button {
      padding: 15px 30px;
      font-size: 16px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
    }
    #startBtn {
      background-color: #4CAF50;
      color: white;
    }
    #status {
      margin-top: 20px;
      font-size: 18px;
      color: #333;
    }
    #countdown {
      font-size: 80px;
      font-weight: bold;
      color: #4CAF50;
      margin: 30px 0;
      display: none;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #4CAF50;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    video {
      margin-top: 20px;
      max-width: 100%;
      border: 2px solid #ddd;
      display: none;
    }
    .save-path {
      margin-top: 15px;
      font-size: 14px;
      color: #666;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .folder-icon {
      width: 20px;
      height: 20px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .folder-icon:hover {
      transform: scale(1.2);
    }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      text-align: center;
      min-width: 400px;
    }
    .modal-title {
      font-size: 20px;
      color: #333;
      margin-bottom: 15px;
      font-weight: bold;
    }
    .modal-message {
      font-size: 16px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .filename-input {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      border: 2px solid #ddd;
      border-radius: 5px;
      margin-bottom: 20px;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }
    .filename-input:focus {
      outline: none;
      border-color: #4CAF50;
    }
    .modal-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
    }
    .modal-btn {
      padding: 10px 25px;
      font-size: 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .modal-btn-save {
      background-color: #4CAF50;
      color: white;
    }
    .modal-btn-save:hover {
      background-color: #45a049;
    }
    .modal-btn-cancel {
      background-color: #f44336;
      color: white;
    }
    .modal-btn-cancel:hover {
      background-color: #da190b;
    }
  </style>
</head>
<body>
  <div class="main-view" id="mainView">
    <img src="assets/wosun.svg" class="logo" alt="莴笋">
    <h1>莴笋录屏</h1>
    <button id="startBtn">开始录制</button>
    <div id="countdown"></div>
    <div class="spinner" id="spinner"></div>
    <div id="status">准备就绪</div>
    <div class="save-path" id="savePath">
      <span id="pathText"></span>
      <img src="assets/floder.svg" class="folder-icon" id="folderIcon" alt="打开文件夹">
    </div>
    <video id="preview" controls></video>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <div class="modal-title">录制完成！</div>
      <div class="modal-message">请输入文件名</div>
      <input type="text" class="filename-input" id="filenameInput" placeholder="录屏_时间戳">
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-save" id="modalSave">保存</button>
        <button class="modal-btn modal-btn-cancel" id="modalCancel">取消</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
