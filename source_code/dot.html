<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>录制中</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: transparent;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 40px;
      cursor: grab;
    }

    .container.dragging {
      cursor: grabbing;
    }

    .dot-circle {
      width: 30px;
      height: 30px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dot-circle img {
      width: 30px;
      height: 30px;
    }

    .timer {
      color: white;
      font-size: 10px;
      font-family: 'Consolas', monospace;
      margin-top: 2px;
      background: rgba(0, 0, 0, 0.7);
      padding: 1px 5px;
      border-radius: 8px;
      white-space: nowrap;
    }

    .controls {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 6px;
    }

    .controls.show {
      display: flex;
    }

    .controls button {
      width: 40px;
      padding: 6px 0;
      font-size: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      color: white;
      background: #f44336;
      transition: transform 0.1s;
    }
    .controls button:hover {
      transform: scale(1.05);
    }
    .controls button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <div class="dot-circle" id="dotCircle">
      <img src="assets/wosun.svg" alt="莴笋">
    </div>
    <div class="timer" id="timer">00:00</div>
    <div class="controls" id="controls">
      <button id="stopBtn">停止</button>
    </div>
  </div>

  <script>
    const stopBtn = document.getElementById('stopBtn');
    const timerEl = document.getElementById('timer');
    const container = document.getElementById('container');
    const controls = document.getElementById('controls');
    const dotCircle = document.getElementById('dotCircle');

    // 计时器
    let seconds = 0;
    let timerInterval = setInterval(() => {
      seconds++;
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      timerEl.textContent = m + ':' + s;
    }, 1000);

    // ===== 手动拖动实现 =====
    let isDragging = false;
    let dragStartScreenX, dragStartScreenY;
    let windowStartX, windowStartY;

    dotCircle.addEventListener('mousedown', async (e) => {
      // 先获取窗口当前位置
      const pos = await window.electronAPI.getDotPosition();
      isDragging = true;
      dragStartScreenX = e.screenX;
      dragStartScreenY = e.screenY;
      windowStartX = pos.x;
      windowStartY = pos.y;
      container.classList.add('dragging');
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const newX = windowStartX + (e.screenX - dragStartScreenX);
      const newY = windowStartY + (e.screenY - dragStartScreenY);
      window.electronAPI.setDotPosition(newX, newY);
    });

    document.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      container.classList.remove('dragging');
      window.electronAPI.snapDot();
    });

    // ===== 悬停展开/收起 =====
    let shrinkTimeout;

    container.addEventListener('mouseenter', () => {
      clearTimeout(shrinkTimeout);
      controls.classList.add('show');
      window.electronAPI.resizeDot(40, 80);
    });

    container.addEventListener('mouseleave', () => {
      shrinkTimeout = setTimeout(() => {
        controls.classList.remove('show');
        window.electronAPI.resizeDot(40, 50);
      }, 1500);
    });

    // 停止
    stopBtn.addEventListener('click', () => {
      clearInterval(timerInterval);
      window.electronAPI.controlRecording('stop');
    });
  </script>
</body>
</html>
